name: Daily pre-market scan

on:
  schedule:
    - cron: "30 13 * * 1-5"   # 8:30 AM ET Mon-Fri (13:30 UTC)
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      AWS_REGION:            ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      WATCHLIST_TABLE:       momentum_watchlist
      TRADES_TABLE:          momentum_trades
      SNS_TOPIC_ARN:         ${{ secrets.SNS_TOPIC_ARN }}
      SECRETS_ARN:           ${{ secrets.SECRETS_ARN }}
      ALPACA_API_KEY:        ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY:     ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL:       ${{ secrets.ALPACA_BASE_URL }}
      MIN_DOLLAR_VOLUME:     "5000000"
      MIN_PRICE:             "2.00"
      MAX_PRICE:             "500.00"
      MIN_GAP_PCT:           "0.03"
      MAX_GAP_PCT:           "0.40"
      VIX_HALT_LEVEL:        "35.0"
      STOP_LOSS_PCT:         "0.02"
      BUY_SIGNAL_SCORE:      "65.0"
      MAX_POSITIONS:         "8"
      POSITION_SIZE_USD:     "1000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # No 'cache: pip' — requires requirements.txt at repo root which we
          # don't have. The install below is fast enough without caching.

      - name: Validate secrets
        run: |
          missing=0
          for var in AWS_REGION AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY \
                     ALPACA_API_KEY ALPACA_SECRET_KEY ALPACA_BASE_URL; do
            if [[ -z "${!var}" ]]; then
              echo "ERROR: $var secret is not set"
              missing=1
            fi
          done
          [[ $missing -eq 1 ]] && exit 1
          echo "All required secrets present"

      - name: Install scanner dependencies
        run: |
          # Use requirements-scanner.txt so pip resolves the full dependency
          # tree including transitive deps (pytz, websockets, msgpack, etc.)
          # that alpaca-py needs but doesn't always pull automatically.
          pip install --quiet -r requirements-scanner.txt

      - name: Run pre-market scanner
        run: |
          # tee captures output to a file while also printing to the Actions console.
          # PIPESTATUS preserves the Python exit code through the pipe.
          python scanner_task/pre_market_scanner.py 2>&1 | tee scan_output.log
          exit ${PIPESTATUS[0]}

      - name: Upload scan output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-output-${{ github.run_id }}
          path: scan_output.log
          retention-days: 7
          if-no-files-found: warn
