name: Deploy

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Trading mode
        required: true
        default: paper
        type: choice
        options: [paper, live]
      email:
        description: Alert email (optional)
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      AWS_REGION:        ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "~> 1.5" }

      - name: Validate secrets
        run: |
          [[ -z "$ALPACA_API_KEY"    ]] && echo "ALPACA_API_KEY missing"    && exit 1
          [[ -z "$ALPACA_SECRET_KEY" ]] && echo "ALPACA_SECRET_KEY missing" && exit 1
          [[ -z "$AWS_REGION"        ]] && export AWS_REGION="us-east-1" && echo "AWS_REGION=${AWS_REGION}" >> $GITHUB_ENV
          echo "Secrets OK"

      - name: Deploy
        run: |
          bash deploy.sh \
            --${{ github.event.inputs.mode }} \
            --email "${{ github.event.inputs.email }}"
